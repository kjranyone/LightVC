# Phase B: Warm-start on full corpus (LibriTTS / VCTK, 100+ speakers)
#
# This is the production config matching MODEL_TRAINING.md §B.
# For a quick smoke test on Edge TTS use phase_b_smoke.yaml instead.
model:
  latent_dim: 1024
  hidden_dim: 1024
  n_conv_blocks: 4
  speaker_embed_dim: 256
  enable_timbre: true
  n_timbre_tokens: 32
  n_attn_heads: 8
  bottleneck_dim: 256
  time_embed_dim: 128

training:
  batch_size: 8
  learning_rate: 3.0e-4
  optimizer_betas: [0.8, 0.99]
  weight_decay: 0.01
  lr_scheduler_gamma: 0.9998
  gradient_clip: 1.0
  max_steps: 50000

losses:
  reconstruction_l1: 1.0
  speaker_consistency: 0.5   # pred speaker ≈ reference speaker ([04-8])
  content_preservation: 0.3  # content_code(pred) ≈ content_code(src) ([04-9])
  speaker_classify: 0.5      # auxiliary CE on ref_embed, prevents collapse ([04-11])

# Role assignment ([04-10]): teacher-free paradigm.
# cross_speaker is a REGULARIZER (reconstruct src despite cross-speaker ref),
# NOT "produce target timbre" (that requires a teacher → Phase C flow matching).
# 0.0 = pure AutoVC reconstruction (recommended for warm-start).
role_assignment:
  cross_speaker: 0.0

data:
  sample_rate: 44100
  latent_frame_rate: 86
  max_utterance_frames: 600
  min_utterance_frames: 30

checkpoint:
  save_every_steps: 5000

hardware:
  device: auto
  mixed_precision: none
