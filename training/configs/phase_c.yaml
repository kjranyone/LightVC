# Phase C: Flow matching on full corpus (LibriTTS / VCTK, 100+ speakers)
#
# This is the production config matching MODEL_TRAINING.md §C.
# For a quick smoke test on Edge TTS use phase_c_smoke.yaml instead.
# Expected wall time on a single Arc B580: ~5-7 days.
model:
  latent_dim: 1024
  hidden_dim: 1024
  n_conv_blocks: 4
  speaker_embed_dim: 256
  enable_timbre: false
  bottleneck_dim: 256
  time_embed_dim: 128

training:
  init_from: checkpoints/phase_b/best.pt
  batch_size: 8
  learning_rate: 1.5e-4
  optimizer_betas: [0.8, 0.99]
  weight_decay: 0.01
  lr_scheduler_gamma: 0.9999
  gradient_clip: 1.0
  max_steps: 200000

losses:
  fm_velocity: 1.0
  latent_l1: 2.0
  speaker_sim: 1.0
  content_inv: 0.5
  # Content/speaker mutual information penalty via gradient reversal ([04-4]).
  # The bottleneck is trained to remove speaker information from the content
  # code. 0.1 is a conservative starting point; raise to 0.2-0.3 if speaker
  # leakage is observed in conversions, lower if intelligibility degrades.
  content_mi: 0.1

data:
  sample_rate: 44100
  latent_frame_rate: 86
  max_utterance_frames: 600
  min_utterance_frames: 30

checkpoint:
  save_every_steps: 10000

hardware:
  device: auto
  # bf16 is supported on Intel Arc B-series (XPU) and modern GPUs.
  # If you see NaN/Inf or loss divergence, fall back to "none" and file a bug
  # referencing plan/04_training_pipeline.md [04-2].
  mixed_precision: bf16
