# Phase D: Flow matching with WavLM-SV loss on decoded audio.
# B=4 for memory safety (DAC decode + WavLM-SV = 11.2 GB peak).
model:
  latent_dim: 1024
  hidden_dim: 1024
  n_conv_blocks: 4
  speaker_embed_dim: 256
  enable_timbre: true
  n_timbre_tokens: 32
  n_attn_heads: 8
  bottleneck_dim: 256
  time_embed_dim: 128

training:
  init_from: checkpoints/phase_b_distill/best.pt
  batch_size: 4
  learning_rate: 3.0e-5
  cold_lr: 1.0e-4
  optimizer_betas: [0.8, 0.99]
  weight_decay: 0.01
  lr_scheduler_gamma: 0.9999
  gradient_clip: 100.0
  max_steps: 20000
  timbre_shift_prob: 0.0

losses:
  wavlm_speaker: 2.0
  fm_velocity: 0.1
  latent_l1: 1.0
  content_inv: 2.0

data:
  sample_rate: 44100
  latent_frame_rate: 86
  max_utterance_frames: 200
  min_utterance_frames: 30

checkpoint:
  save_every_steps: 2000

hardware:
  device: auto
  mixed_precision: fp32
