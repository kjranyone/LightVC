# Phase B: Warm-start on TTS corpus (17 speakers, 170 utterances)
model:
  latent_dim: 1024
  hidden_dim: 256
  n_conv_blocks: 4
  speaker_embed_dim: 256
  enable_timbre: false
  bottleneck_dim: 256
  time_embed_dim: 128

training:
  batch_size: 4
  learning_rate: 3.0e-4
  optimizer_betas: [0.8, 0.99]
  weight_decay: 0.01
  lr_scheduler_gamma: 0.9998
  gradient_clip: 1.0
  max_steps: 10000

losses:
  reconstruction_l1: 1.0
  speaker_consistency: 0.5
  content_preservation: 0.3

data:
  sample_rate: 44100
  latent_frame_rate: 86
  max_utterance_frames: 300
  min_utterance_frames: 30

checkpoint:
  save_every_steps: 2000

hardware:
  device: auto
  mixed_precision: none
